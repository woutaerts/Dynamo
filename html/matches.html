<body>

<!-- Header -->
<div id="header-placeholder"></div>

<main>

    <!-- Page Hero -->
    <section class="page-hero">
        <div class="container">
            <h1>Wedstrijden</h1>
        </div>
    </section>

    <!-- Global Loading & Error -->
    <div id="matches-global-loader" class="loader hidden"></div>
    <div id="matches-error" class="error-message hidden"></div>

    <!-- Next Match Countdown -->
    <section class="countdown-section">
        <div class="container">
            <h2 class="section-title">Volgende wedstrijd</h2>
            <div class="upcoming-match-name">
                <h3 id="next-match-title">Laden...</h3>
            </div>
            <div id="home-match-sponsor" class="match-sponsor-block">
                <p class="match-sponsor-label">Matchbalsponsor</p>
                <a id="home-sponsor-link" href="#" target="_blank" rel="noopener" class="match-sponsor-link">
                    <img id="home-sponsor-logo" src="" alt="" loading="lazy">
                </a>
            </div>
            <div class="countdown" id="countdown">
                <div class="countdown-block">
                    <div class="countdown-box"><span id="days">0</span></div>
                    <small>Dagen</small>
                </div>
                <div class="countdown-block">
                    <div class="countdown-box"><span id="hours">0</span></div>
                    <small>Uren</small>
                </div>
                <div class="countdown-block">
                    <div class="countdown-box"><span id="minutes">0</span></div>
                    <small>Minuten</small>
                </div>
                <div class="countdown-block">
                    <div class="countdown-box"><span id="seconds">0</span></div>
                    <small>Seconden</small>
                </div>
            </div>
        </div>
    </section>

    <!-- Team Form -->
    <section class="form-section">
        <div class="container">
            <div class="form-display">
                <h3 class="section-subtitle">Vorm</h3>
                <p class="form-description">Laatste 5 wedstrijden</p>
                <div class="form-results" id="form-results">
                    <!-- Dynamic insertion of form results -->
                </div>
            </div>
        </div>
    </section>

    <!-- Upcoming Fixtures -->
    <section class="fixtures-section">
        <div class="container">
            <h2 class="section-title">Komende wedstrijden</h2>
            <div class="matches-grid" id="upcoming-matches-grid">
                <!-- Dynamic insertion of upcoming games -->
            </div>
        </div>
    </section>

    <!-- Recent Results -->
    <section class="matches-section" id="matches">
        <div class="container">
            <h2 class="section-title">Recente resultaten</h2>
            <div class="matches-grid" id="recent-matches-grid">
                <!-- Dynamic insertion of recent games -->
            </div>
        </div>
    </section>

    <!-- Season Timeline -->
    <section class="timeline-section">
        <div class="container">
            <h2 class="section-title">Seizoenstijdlijn</h2>
            <div class="timeline-wrapper scrollbar-x">
                <div class="timeline-start-knob"></div>
                <div class="timeline" id="season-timeline">
                    <!-- Dynamic insertion of season timeline -->
                </div>
            </div>
        </div>
    </section>

    <!-- Match Sponsors Ticker -->
    <section class="ticker-section">
        <div class="container">
            <h2 class="section-title">Onze matchbalsponsors</h2>
            <div class="ticker-wrapper" id="sponsor-ticker-wrapper">
                <div class="ticker-track" id="sponsor-ticker-track">
                </div>
            </div>
        </div>
    </section>

    <!-- Match Modal -->
    <div id="match-modal-placeholder"></div>

</main>

<!-- Footer -->
<div id="footer-placeholder"></div>
